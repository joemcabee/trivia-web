name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to container registry
      uses: docker/login-action@v3
      with:
        registry: ${{ vars.DOCKER_SERVER }}
        username: ${{ vars.DOCKER_USER }}
        password: ${{ secrets.DOCKER_PW }}

    - name: Build and push Back-End image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/Dockerfile
        platforms: linux/arm64
        push: true
        tags: ${{ vars.DOCKER_SERVER }}/slacker-trivia-web-be:latest

    - name: Build and push Front-End image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        platforms: linux/arm64
        push: true
        tags: ${{ vars.DOCKER_SERVER }}/slacker-trivia-web-fe:latest